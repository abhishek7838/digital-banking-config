server:
  port: ${SERVER_PORT:8888}

spring:
  application:
    name: config-server

  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_REPO_URL}
          username: ${GIT_USERNAME}
          password: ${GIT_TOKEN}
          default-label: main
          clone-on-start: true
          force-pull: true
          search-paths: config-repo

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    configserver:
      enabled: false